name: gamenerdz-discovery-monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor_gamenerdz_discovery.py

      - name: Commit updated seen links
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add known_links.json
          git diff --cached --quiet || git commit -m "Update known links"
          git push
